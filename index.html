<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,
          maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>打飞机 · Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        /* 居中容器 — 480×720 比例适配 */
        #game-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* 按 480:720 比例缩放，取屏幕能容纳的最大尺寸 */
            width: 480px;
            height: 720px;
            max-width: 100vw;
            max-height: 100vh;
        }
        /* 保持宽高比的缩放 */
        @media (max-aspect-ratio: 480/720) {
            #game-container {
                width: 100vw;
                height: 150vw;  /* 100 * 720/480 */
                max-height: 100vh;
            }
        }
        @media (min-aspect-ratio: 480/720) {
            #game-container {
                height: 100vh;
                width: 66.67vh;  /* 100 * 480/720 */
                max-width: 100vw;
            }
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        /* 加载提示 */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0df;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            font-size: 20px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 16px;
            border: 3px solid rgba(0, 220, 255, 0.2);
            border-top-color: #0df;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>加载中…</div>
    </div>
    <div id="game-container"></div>

    <script>
        // 隐藏加载提示（pygbag 启动后会自动移除）
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading) loading.style.display = 'none';
            }, 3000);
        });
    </script>
    <!-- pygbag 会在构建时注入必要的脚本 -->
</body>
</html>
